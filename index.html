<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Nature Base Sound</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;background:#f2f4f7;color:#1a1a1a;padding-bottom:calc(env(safe-area-inset-bottom,16px)+16px);-webkit-font-smoothing:antialiased}
.hd{background:linear-gradient(135deg,#1B3A4B,#2E86C1);padding:16px 18px 14px;padding-top:calc(env(safe-area-inset-top,16px)+12px);display:flex;justify-content:space-between;align-items:center}
.hd h1{font-size:17px;font-weight:700;color:#fff}.hd-r{font-size:10px;color:#85C1E9}
.ct{padding:14px;max-width:600px;margin:0 auto}

/* Tabs */
.tabs{display:flex;background:#fff;border-radius:12px;padding:3px;margin-bottom:14px;box-shadow:0 1px 4px #0001}
.tab{flex:1;padding:9px 0;text-align:center;font-size:12px;font-weight:600;color:#888;border-radius:10px;cursor:pointer;transition:all .15s;-webkit-user-select:none}
.tab.a{background:#1B3A4B;color:#fff;box-shadow:0 2px 8px #1B3A4B33}

/* Section */
.sec{margin-bottom:14px}
.sec-head{display:flex;align-items:center;gap:5px;margin-bottom:8px;padding:0 2px}
.sec-num{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff}
.sec-label{font-size:12px;font-weight:700;letter-spacing:.3px}
.sec-hint{font-size:9px;color:#999;margin-left:auto}
.cat-label{font-size:9px;font-weight:700;letter-spacing:.4px;padding:3px 8px;margin:6px 0 4px;border-radius:4px;display:inline-block}

/* Buttons */
.bg{display:grid;gap:5px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.btn{padding:12px 6px;border-radius:12px;border:2px solid #e2e5ea;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;background:#fff;color:#555;transition:all .12s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;-webkit-user-select:none;box-shadow:0 1px 3px #0001}
.btn:active{transform:scale(.96)}
.btn .bi{font-size:20px;line-height:1}.btn .bt{font-size:10px;font-weight:600}
.btn.a{color:#fff;border-color:transparent;font-weight:700;box-shadow:0 3px 12px #0002}
.btn.d{opacity:.25;cursor:default;background:#f5f5f5;border-color:#eee}.btn.d:active{transform:none}.btn.d .bt{text-decoration:line-through}

/* Cards */
.card{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 6px #0001}
.card-head{padding:12px 16px;font-size:14px;font-weight:700;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.card-head span{font-size:10px;color:#999;font-weight:400}

.fname-bar{background:linear-gradient(135deg,#e8f0f8,#dce8f4);border:1px solid #b8cce0;border-radius:14px;padding:14px 16px;margin-bottom:12px;text-align:center}
.fname-label{font-size:9px;color:#2E86C1;font-weight:700;letter-spacing:1px;margin-bottom:4px}
.fname-text{font-size:14px;color:#1B3A4B;font-family:'Menlo','Courier New',monospace;font-weight:600;word-break:break-all}
.copy-btn{display:inline-block;margin-top:8px;padding:7px 20px;border-radius:8px;border:1.5px solid #2E86C1;background:#fff;color:#2E86C1;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.copy-btn:active{background:#2E86C1;color:#fff}

.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tag{font-size:11px;padding:4px 10px;border-radius:6px;font-weight:600;border:1px solid}

.warn{background:#FEF0F0;border:1.5px solid #E74C3C;border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#C0392B;line-height:1.5}

/* Layer rows */
.layer{display:flex;gap:10px;align-items:flex-start;padding:12px 16px;border-bottom:1px solid #f5f5f5}
.layer:last-child{border-bottom:none}
.layer-tag{flex-shrink:0;font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;margin-top:1px}
.layer-c{flex:1}
.layer-eq{font-size:13px;color:#333;font-weight:500;margin-bottom:2px}
.layer-rv{font-size:12px;color:#888}

.chain{padding:14px 16px;background:#f8f9fb;border-top:1px solid #eee}
.chain-t{font-size:11px;font-weight:700;color:#1B3A4B;margin-bottom:8px}
.chain-r{font-size:10.5px;color:#666;line-height:1.7;margin-bottom:3px}.chain-l{font-weight:700;display:inline-block;width:36px}

/* List items */
.li{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #f5f5f5;cursor:pointer;-webkit-user-select:none}
.li:active{background:#f5f7fa}.li.a{background:#EBF5FB}.li:last-child{border-bottom:none}
.li-n{font-size:14px;color:#555}.li-n.a{font-weight:700;color:#1B3A4B}
.li-b{font-size:9px;color:#2ecc71;margin-left:5px;font-weight:600}
.li-cat{font-size:8px;padding:2px 6px;border-radius:4px;margin-left:5px;font-weight:600}
.li-c{font-family:'Menlo',monospace;font-size:9px;color:#bbb}

.logic{padding:10px 16px;border-bottom:1px solid #f5f5f5;font-size:10.5px;display:flex;gap:6px;align-items:flex-start}
.logic-s{min-width:90px;font-weight:600}.logic-r{color:#777;line-height:1.5}



/* Source list (v5) */
.sr-int{background:linear-gradient(135deg,#1B3A4B,#2E86C1);border-radius:14px;padding:13px 15px;margin-bottom:12px;color:#fff}
.sr-int h3{font-size:13px;font-weight:800;margin-bottom:7px}
.sr-int p{font-size:10.5px;line-height:1.7;color:#D6EAF8}
.sr-int b{color:#fff;font-weight:800}
.sr-row{padding:11px 13px;border-bottom:1px solid #f2f2f2;display:flex;gap:10px;align-items:flex-start}
.sr-row:last-child{border-bottom:none}
.sr-i{font-size:22px;line-height:1.2;width:26px;text-align:center;flex:none}
.sr-b{flex:1;min-width:0}
.sr-h{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap}
.sr-n{font-size:13.5px;font-weight:700;color:#1a1a1a}
.sr-tag{font-size:8px;font-weight:800;padding:2px 5px;border-radius:4px}
.sr-m{font-size:9.5px;color:#8a9098;font-family:ui-monospace,'SF Mono',monospace;margin-bottom:3px}
.sr-m b{color:#1B3A4B;font-weight:700}
.sr-r{font-size:10.5px;color:#4a5259;line-height:1.6}
.sr-no{width:20px;flex:none;font-size:9px;font-weight:800;color:#c3c9cf;padding-top:4px;text-align:right;font-family:ui-monospace,monospace}
/* Matrix (v4) */
.mx-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.mx-seg{display:flex;background:#fff;border-radius:9px;padding:2px;box-shadow:0 1px 4px #0001}
.mx-seg div{padding:6px 11px;font-size:11px;font-weight:600;color:#888;border-radius:7px;cursor:pointer}
.mx-seg div.a{background:#16A085;color:#fff}
.mx-chip{padding:5px 9px;border-radius:7px;font-size:10px;font-weight:600;background:#fff;color:#888;cursor:pointer;border:1px solid #e2e5ea;box-shadow:0 1px 3px #0001}
.mx-chip.a{background:#1B3A4B;color:#fff;border-color:#1B3A4B}
.mx-sort{width:100%;padding:8px 10px;border-radius:9px;border:1px solid #e2e5ea;font-size:11px;font-weight:600;font-family:inherit;background:#fff;color:#444}
.mx-row{padding:10px 13px;border-bottom:1px solid #f2f2f2}
.mx-row:last-child{border-bottom:none}
.mx-t{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.mx-n{font-size:13px;font-weight:700;color:#1a1a1a}
.mx-k{font-size:8px;font-weight:800;padding:2px 5px;border-radius:4px;letter-spacing:.3px}
.mx-sc{margin-left:auto;font-size:11px;font-weight:800}
.mx-ph{font-size:9.5px;color:#7a8288;font-family:ui-monospace,'SF Mono',monospace;line-height:1.7;margin-bottom:7px}
.mx-ph b{color:#1B3A4B;font-weight:700}
.mx-g{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.mx-g.r2{grid-template-columns:repeat(2,1fr);margin-top:4px}
.mx-c{text-align:center}
.mx-cl{font-size:8px;color:#999;font-weight:600;margin-bottom:2px;display:block}
.mx-cv{font-size:10px;font-weight:800;color:#fff;border-radius:4px;padding:3px 0}
.mx-hint{font-size:9px;color:#999;padding:0 2px 8px;line-height:1.6}
.fo{text-align:center;padding:14px;font-size:10px;color:#bbb}

@media(min-width:700px){.ct{max-width:680px;padding:20px}}
</style>
</head>

h+=`<div class="layer"><span class="layer-tag" style="color:${c};background:${c}12">${l}</span><div class="layer-c"><div class="layer-eq">🎚️ ${x}</div></div></div>`});
h+=`</div>`;

h+=`<div class="card"><div class="card-head">교체 가능한 배경음<span>${vo.length}종</span></div>`;
vo.forEach(k=>{const o=D.object[k];const a=k===S.ob;h+=`<div class="li ${a?'a':''}" onclick="pk('ob','${k}')"><div><span class="li-n ${a?'a':''}">${o.i} ${o.n}</span><span class="li-cat" style="color:${CC[o.cat]};background:${CC[o.cat]}15">${CN[o.cat]}</span>${a?'<span class="li-b">● 선택</span>':''}</div><span class="li-c">${o.lv}dB · 루프 ${o.lp}s</span></div>`});
h+=`</div>`;

if(vp.length){h+=`<div class="card"><div class="card-head" style="color:#16A085">추가 가능한 포인트음<span>${vp.length}종 활성 · ${S.pt.length}종 선택</span></div>`;
vp.forEach(k=>{const p=D.point[k];const a=S.pt.includes(k);h+=`<div class="li ${a?'a':''}" onclick="pk('pt','${k}')"><div><span class="li-n ${a?'a':''}" style="${a?'color:#16A085':''}">${p.i} ${p.n}</span>${a?'<span class="li-b">✓</span>':''}</div><span class="li-c">${p.bd} · ${p.dn}/분</span></div>`});
h+=`</div>`}
}

// ── TAB: MATRIX ──
if(tab==="matrix"){
const isBg=MX.g==="object";
let rows=Object.entries(isBg?D.object:D.point);
rows.sort((a,b)=>(mxScore(b[1])-mxScore(a[1]))*(MX.dir===-1?1:-1));

h+=`<div class="mx-bar">
<div class="mx-seg"><div class="${isBg?'a':''}" onclick="mxSet('g','object')">배경음</div><div class="${!isBg?'a':''}" onclick="mxSet('g','point')">포인트음</div></div>
<span class="mx-chip" onclick="mxSet('sort','${MX.sort}')">${MX.dir===-1?'▼ 내림':'▲ 오름'}</span>
</div>`;

const opts=[["f0","수면 적합도"],["f1","명상 적합도"],["f2","집중 적합도"],["f3","음성마스킹 적합도"],["f4","태교 적합도"],["r0","루프 인지 (낮은 순)"],["r1","각성 유발 (낮은 순)"],["cf","크레스트 팩터"]];
if(isBg)opts.push(["1f","1/f 근접도"]);else opts.push(["dn","이벤트 밀도"]);
h+=`<select class="mx-sort" onchange="mxSet('sort',this.value)">${opts.map(([k,l])=>`<option value="${k}" ${MX.sort===k?'selected':''}>정렬 · ${l}</option>`).join('')}</select>`;
h+=`<div class="mx-hint">${isBg?'배경음 = 개별 이벤트 식별 불가 · 무한 루프 가능. 정상성·1/f 근접도·루프 길이가 성패를 가름.':'포인트음 = 이벤트 식별됨 · 위치와 시각을 지정. 밀도·어택·각성도가 성패를 가름.'}</div>`;

h+=`<div class="card"><div class="card-head" style="color:#16A085">${isBg?'🌊 배경음 원본':'✨ 포인트음 원본'}<span>${rows.length}종</span></div>`;
rows.forEach(([k,v])=>{
  const st=MX.sort;
  let disp = st.startsWith("f")?v.f[+st[1]]+"/5" : st.startsWith("r")?v.r[+st[1]]+"/5" : st==="1f"?(v.sl+" dB/oct") : st==="cf"?(v.cf+" dB") : st==="dn"?(v.dn+"/분") : "";
  h+=`<div class="mx-row">
  <div class="mx-t"><span class="mx-n">${v.i} ${v.n}</span>
  ${isBg?`<span class="mx-k" style="color:${CC[v.cat]};background:${CC[v.cat]}15">${CN[v.cat]}</span>`:''}
  ${v.k==='lib'?`<span class="mx-k" style="color:#E67E22;background:#E67E2215">라이브러리</span>`:''}
  <span class="mx-sc" style="color:#16A085">${disp}</span></div>
  <div class="mx-ph">대역 <b>${v.bd}</b> · ${isBg?`기울기 <b>${v.sl}</b> dB/oct · 정상성 <b>${STN[v.st]}</b> · 상관도 <b>${v.sc}</b> · 루프 <b>${v.lp}s</b>`:`밀도 <b>${v.dn}</b>/분 · 어택 <b>${v.at}</b>ms`} · 크레스트 <b>${v.cf}</b>dB · 레벨 <b>${v.lv}</b>dB</div>
  <div class="mx-g">${v.f.map((n,i)=>`<div class="mx-c"><span class="mx-cl">${FN[i]}</span><span class="mx-cv" style="background:${mxColor(n)}">${n}</span></div>`).join('')}</div>
  <div class="mx-g r2">${v.r.map((n,i)=>`<div class="mx-c"><span class="mx-cl">${RK[i]} 위험</span><span class="mx-cv" style="background:${mxColor(6-n)}">${n}</span></div>`).join('')}</div>
  </div>`});
h+=`</div>`;
}

h+=`<div class="fo">General Pause Sound Objet</div>`;
document.getElementById('app').innerHTML=h}
render();
</script>
</body>
</html>
